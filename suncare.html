<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>선케어 정량 조사 대시보드</title>
<style>
  :root{
    --bg:#f5f6f7; --card:#ffffff; --ink:#2f3138; --muted:#878b91; --line:#e8e9eb;
    --accent:#cf8a35; --accent-soft:#f7ead4; --accent-ink:#7a4e12;
    --rail:#fbfbfc; --rail-line:#e9e9ec; --rail-ink:#5b5e66; --rail-h:#34363c;
    --c1:#5e8cb8; --c2:#e0a45c; --c3:#7bab84; --c4:#cf8089; --c5:#9588bd;
    --c6:#6aa6a6; --c7:#c2ad6e; --c8:#9aa1ad;
    --neu:#d3d6d2; --track:#edeff1;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .rail{width:248px;flex:0 0 248px;background:var(--rail);color:var(--rail-ink);position:sticky;top:0;height:100vh;
        overflow-y:auto;padding:22px 0;display:flex;flex-direction:column;border-right:1px solid var(--rail-line)}
  .rail h1{font-size:14px;letter-spacing:.01em;color:var(--rail-h);margin:0 20px 2px;font-weight:700}
  .rail .sub{font-size:11px;color:#9b9788;margin:0 20px 18px}
  .nav{display:flex;flex-direction:column;gap:1px;padding:0 10px}
  .nav button{all:unset;cursor:pointer;display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-radius:9px;
              color:var(--rail-ink);font-size:13px;line-height:1.35}
  .nav button:hover{background:rgba(0,0,0,.045)}
  .nav button.on{background:var(--accent-soft);color:var(--accent-ink);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
  .nav .num{font-variant-numeric:tabular-nums;opacity:.55;min-width:16px}
  .rail .foot{margin:auto 20px 0;padding-top:16px;font-size:10.5px;color:#9b9788;border-top:1px solid var(--rail-line)}
  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(251,250,245,.93);backdrop-filter:blur(6px);
          border-bottom:1px solid var(--line);padding:14px 28px}
  .topbar .row{display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px}
  .topbar .ttl{font-weight:700;font-size:14px;margin-right:6px}
  .nbadge{background:var(--accent);color:#fff;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:18px;
        padding:4px 11px 4px 9px;font-size:12px;cursor:pointer;user-select:none}
  .chip input{accent-color:var(--accent);margin:0;cursor:pointer}
  .chip.on{border-color:var(--accent);background:var(--accent-soft)}
  .chip .en{color:var(--muted);font-size:10.5px}
  .minibtn{all:unset;cursor:pointer;font-size:12px;color:var(--accent-ink);border:1px solid var(--accent);
           border-radius:16px;padding:4px 10px}
  .minibtn.ghost{color:var(--muted);border-color:var(--line)}
  .wrap{padding:24px 28px 80px;max-width:1080px;width:100%}
  .panel{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .sec-h{margin:0 0 4px;font-size:21px;font-weight:700}
  .sec-d{margin:0 0 20px;color:var(--muted);font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;
        box-shadow:0 1px 2px rgba(80,70,40,.03)}
  .card h3{margin:0 0 2px;font-size:15px;font-weight:650}
  .card .meta{font-size:11.5px;color:var(--muted);margin-bottom:12px}
  .insight{background:#f7f8f9;border:1px solid var(--line);border-left:3px solid var(--accent);
           border-radius:9px;padding:9px 13px;font-size:12.5px;color:#4c4f55;margin:13px 0 0}
  .insight b{color:#2f3138}
  .note{font-size:11.5px;color:var(--muted);margin-top:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  /* bars */
  .bars{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .bar{display:grid;grid-template-columns:minmax(120px,42%) 1fr;gap:12px;align-items:center}
  .bar .lab{font-size:12.5px;line-height:1.3}
  .bar .lab .kr{color:var(--muted);font-size:11px;display:block}
  .bar .track{position:relative;background:var(--track);border-radius:6px;height:24px}
  .bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;min-width:2px;display:flex;align-items:center;justify-content:flex-end;padding:0 9px;overflow:hidden}
  .bar .val{font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .bar .val.in{color:#fff}
  .bar .val.out{position:absolute;top:0;bottom:0;display:flex;align-items:center;color:#46473d}
  .bar .val .sub{opacity:.72;font-weight:500}
  /* legend */
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin:4px 0 14px;font-size:11.5px}
  .legend span.lg{display:inline-flex;align-items:center;gap:6px}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
  .strow{display:grid;grid-template-columns:96px 1fr;gap:12px;align-items:center;margin-bottom:9px}
  .strow .rlab{font-size:12.5px;font-weight:600}
  .stack{display:flex;height:27px;border-radius:6px;overflow:hidden;background:var(--track)}
  .stack .seg{display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:#fff;
              font-variant-numeric:tabular-nums;min-width:0;overflow:hidden}
  /* donut */
  .donutwrap{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .donut{width:152px;height:152px;border-radius:50%;flex:0 0 152px;position:relative}
  .donut::after{content:"";position:absolute;inset:31px;background:var(--card);border-radius:50%}
  .donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;text-align:center;padding:0 34px}
  .donut .ctr b{font-size:22px;line-height:1}.donut .ctr small{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.1}
  .dlegend{display:flex;flex-direction:column;gap:7px;font-size:12.5px;min-width:200px;flex:1}
  .dlegend .it{display:grid;grid-template-columns:14px 1fr auto;gap:8px;align-items:center}
  .dlegend .it .pc{font-weight:700;font-variant-numeric:tabular-nums}
  .dlegend .it .nn{color:var(--muted);font-size:11px;font-weight:400}
  /* tables */
  table.xt{border-collapse:collapse;width:100%;font-size:12px;margin-top:4px}
  table.xt th,table.xt td{border:1px solid var(--line);padding:7px 9px;text-align:center;font-variant-numeric:tabular-nums}
  table.xt th{background:#f6f3ea;font-weight:600}
  table.xt td.rh{text-align:left;background:#faf8f1;font-weight:600}
  /* ranking */
  .rank{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .rank .ri{display:grid;grid-template-columns:30px minmax(110px,34%) 1fr 78px;gap:12px;align-items:center}
  .rank .pos{font-size:18px;font-weight:800;color:var(--accent);text-align:center;font-variant-numeric:tabular-nums}
  .rank .nm{font-size:13px;font-weight:600}
  .rank .tr{background:var(--track);border-radius:6px;height:14px;overflow:hidden}
  .rank .tf{height:100%;background:var(--c1);border-radius:6px}
  .rank .mv{font-size:12px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}
  /* mean */
  .meanbox{display:flex;align-items:baseline;gap:10px}
  .meanbox .big{font-size:42px;font-weight:800;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums}
  .meanbox .scale{font-size:12px;color:var(--muted)}
  .scalebar{margin-top:14px;height:9px;border-radius:5px;background:linear-gradient(90deg,#efeadd,#e7e0cf);position:relative}
  .scalebar .pin{position:absolute;top:-4px;width:3px;height:17px;background:var(--ink);border-radius:2px}
  .scaleends{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:5px}
  /* tabs / breakdown */
  .ftabs{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 12px}
  .ftabs button{all:unset;cursor:pointer;border:1px solid var(--line);border-radius:16px;padding:5px 13px;font-size:12px;background:#fff}
  .ftabs button:hover{border-color:var(--accent)}
  .ftabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .ftabs button.on span{opacity:.85}
  .breakbody{margin-top:4px}
  /* keyword w/ hover voc */
  .kwrow{position:relative}
  .kwrow .voctip{display:none;position:absolute;left:0;top:100%;z-index:30;background:#2f2e27;color:#fdf8ee;
        border-radius:9px;padding:10px 12px;font-size:11.5px;line-height:1.5;width:min(420px,72vw);box-shadow:0 8px 24px rgba(0,0,0,.22);margin-top:4px}
  .kwrow:hover .voctip{display:block}
  .kwrow .voctip .vq{display:block;margin:3px 0;padding-left:11px;border-left:2px solid var(--accent)}
  .kwrow td .more{color:var(--accent-ink);font-size:10.5px}
  .comment{font-size:12px;color:#55554a;background:#f7f5ed;border-radius:8px;padding:8px 11px;margin-top:10px}
  .nores{color:var(--muted);font-size:12.5px;padding:18px;text-align:center;background:#faf8f1;border-radius:10px}
  .smallbase{color:#c0573f;font-weight:600}
  .hint{font-size:11.5px;color:var(--muted)}
  .subt{font-size:12.5px;font-weight:650;margin:14px 0 6px}
</style>
</head>

<script>
const DATA=JSON.parse(document.getElementById('survey-data').textContent);
const REC=DATA.records, OPT=DATA.options, NTOT=DATA.n_total, TRANS=DATA.trans||{};
const PALETTE=['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)','var(--c8)'];
const SKIN_KR={"Combination":"복합성","Sensitive":"민감성","Normal":"중성","Dry":"건성","Oily":"지성","Acne-Prone":"여드름성"};
const FREQ=["Every day","Every other day","Rarely","Never"], FREQ_C=["var(--c3)","var(--c1)","var(--c2)","var(--neu)"];
const EXP=["Currently using","Have used before","Have never used"], EXP_C=["var(--c1)","var(--c6)","var(--neu)"];
const FINISH_ORDER=["Matte, Powdery","Satin","Dewy, Glowy"];
const FINISH_COLOR={"Matte, Powdery":"var(--c2)","Satin":"var(--c1)","Dewy, Glowy":"var(--c3)"};
function tr(v){ if(v==null)return ''; return TRANS[v]!=null?TRANS[v]:String(v); }
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
const round=x=>Math.round(x), pct=(n,d)=>d?round(n/d*100):0;
function trunc(s,n){s=String(s);return s.length>n?s.slice(0,n-1)+'…':s;}

let SEL=new Set(DATA.skin_order);
function filtered(){return REC.filter(r=>r.skin&&SEL.has(r.skin));}

/* aggregation */
function countSingle(recs,key,order){const c={};let base=0;recs.forEach(r=>{const v=r[key];if(v!=null){c[v]=(c[v]||0)+1;base++;}});
  const labels=order?order.slice():Object.keys(c).sort((a,b)=>c[b]-c[a]);
  if(order)Object.keys(c).forEach(k=>{if(!labels.some(l=>l===k))labels.push(k);});
  return{base,items:labels.map(l=>({label:l,n:c[l]||0,pct:pct(c[l]||0,base)})).filter(x=>x.n>0)};}
function countMulti(recs,key,order){const c={};let base=0;recs.forEach(r=>{const a=r[key];if(Array.isArray(a)&&a.length){base++;a.forEach(v=>c[v]=(c[v]||0)+1);}});
  const labels=order?order.slice():Object.keys(c).sort((a,b)=>c[b]-c[a]);
  return{base,items:labels.filter(l=>c[l]).map(l=>({label:l,n:c[l],pct:pct(c[l],base)}))};}
function meanOf(recs,key){let s=0,n=0;recs.forEach(r=>{const v=r[key];if(typeof v==='number'){s+=v;n++;}});return{mean:n?s/n:0,n};}
function meanRank(recs,code){let s=0,n=0;recs.forEach(r=>{const v=r.rank&&r.rank[code];if(typeof v==='number'){s+=v;n++;}});return n?s/n:null;}

/* dom */
function el(h){const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;}
function card(title,meta){const c=el('<div class="card"></div>');if(title)c.appendChild(el(`<h3>${esc(title)}</h3>`));if(meta)c.appendChild(el(`<div class="meta">${meta}</div>`));return c;}
function insight(t){return el(`<div class="insight">${t}</div>`);}
function labelHTML(v){return `<span class="lab">${esc(tr(v))}</span>`;}
function topLabel(res){return res.items[0]?tr(res.items[0].label):'-';}
function smallBaseNote(base){return base<30?`<span class="smallbase">표본이 작습니다(n=${base}). 해석에 주의하세요.</span> `:'';}

/* smart insight generator */
function smartInsight(res,{unit='%',thing='응답',multi=false}={}){
  if(!res.items.length)return '응답이 없습니다.';
  const a=res.items[0], b=res.items[1];
  const top=`<b>${esc(tr(a.label))}</b>(${a.pct}%)`;
  if(!b)return `${top} 단일 ${thing}입니다.`;
  const gap=a.pct-b.pct;
  const top2=a.pct+b.pct;
  if(multi){
    if(a.pct>=60) return `대다수가 ${top}을(를) 꼽았고, ${esc(tr(b.label))}(${b.pct}%)가 뒤를 잇습니다.`;
    return `${top}와 ${esc(tr(b.label))}(${b.pct}%)가 핵심으로, 이 둘만으로 응답의 큰 비중을 차지합니다.`;
  }
  if(gap>=20) return `${top}이(가) 2위 ${esc(tr(b.label))}(${b.pct}%)를 ${gap}%p 차로 압도합니다.`;
  if(a.pct<35) return `뚜렷한 1위 없이 ${top}·${esc(tr(b.label))}(${b.pct}%)로 의견이 갈립니다(상위 2개 합 ${top2}%).`;
  return `${top}이(가) 가장 많고, 2위 ${esc(tr(b.label))}(${b.pct}%)와 ${gap}%p 차입니다.`;
}

/* bars (reusable) */
function track(w,col,val,h,minIn){h=h||24;w=Math.max(0,Math.min(w,100));const inside=w>=(minIn||14);
  return `<div class="track" style="height:${h}px"><div class="fill" style="width:${w}%;background:${col}">${inside?`<span class="val in">${val}</span>`:''}</div>${inside?'':`<span class="val out" style="left:calc(${w}% + 8px)">${val}</span>`}</div>`;}
function barsInto(box,items,{colors,percentOnly,colorByLabel}={}){
  const minIn=percentOnly?9:14;
  items.forEach((it,idx)=>{const col=colorByLabel?(colorByLabel[it.label]||'var(--neu)'):(colors?colors[idx%colors.length]:PALETTE[idx%PALETTE.length]);
    const val=percentOnly?`${it.pct}%`:`${it.pct}% <span class="sub">(${it.n})</span>`;
    box.appendChild(el(`<div class="bar">${labelHTML(it.label)}${track(it.pct,col,val,24,minIn)}</div>`));});
}
function barH(parent,{title,meta,res,colors,colorByLabel,insightFn,note,percentOnly}){
  const c=card(title,meta);
  if(!res.items.length||!res.base){c.appendChild(el('<div class="nores">선택된 조건에 해당하는 응답이 없습니다.</div>'));parent.appendChild(c);return;}
  const box=el('<div class="bars"></div>');barsInto(box,res.items,{colors,colorByLabel,percentOnly});c.appendChild(box);
  if(insightFn)c.appendChild(insight(insightFn(res)));
  if(note)c.appendChild(el(`<div class="note">${note}</div>`));
  parent.appendChild(c);
}
function donut(parent,{title,meta,res,colors,colorByLabel,centerBig,centerSmall,insightFn,note}){
  const c=card(title,meta);
  if(!res.base){c.appendChild(el('<div class="nores">선택된 조건에 해당하는 응답이 없습니다.</div>'));parent.appendChild(c);return;}
  let acc=0;const segs=[];
  res.items.forEach((it,idx)=>{const col=colorByLabel?(colorByLabel[it.label]||'var(--neu)'):(colors?colors[idx%colors.length]:PALETTE[idx%PALETTE.length]);
    segs.push(`${col} ${acc}% ${acc+it.pct}%`);acc+=it.pct;it._col=col;});
  if(acc<100&&segs.length)segs.push(`var(--neu) ${acc}% 100%`);
  const top=res.items[0];
  const big=centerBig!=null?centerBig:(top?top.pct+'%':'-');
  const small=centerSmall!=null?centerSmall:'';
  const wrap=el('<div class="donutwrap"></div>');
  wrap.appendChild(el(`<div class="donut" style="background:conic-gradient(${segs.join(',')})"><div class="ctr"><b>${big}</b><small>${esc(small)}</small></div></div>`));
  const lg=el('<div class="dlegend"></div>');
  res.items.forEach(it=>lg.appendChild(el(`<div class="it"><span class="sw" style="background:${it._col}"></span><span>${esc(tr(it.label))}</span><span class="pc">${it.pct}% <span class="nn">(${it.n})</span></span></div>`)));
  wrap.appendChild(lg);c.appendChild(wrap);
  if(insightFn)c.appendChild(insight(insightFn(res)));
  if(note)c.appendChild(el(`<div class="note">${note}</div>`));
  parent.appendChild(c);
}
function stacked100(parent,{title,meta,rows,cats,colors,insightFn,note}){
  const c=card(title,meta);
  const lg=el('<div class="legend"></div>');
  cats.forEach((cat,i)=>lg.appendChild(el(`<span class="lg"><span class="sw" style="background:${colors[i%colors.length]}"></span>${esc(tr(cat))}</span>`)));
  c.appendChild(lg);
  rows.forEach(row=>{const r=countSingle(row.recs,row.key,cats);
    const strow=el(`<div class="strow"><div class="rlab">${esc(row.label)}</div></div>`);
    const stack=el('<div class="stack"></div>');
    if(!r.base)stack.appendChild(el('<div class="seg" style="flex:1;background:var(--track);color:var(--muted)">응답 없음</div>'));
    else cats.forEach((cat,i)=>{const it=r.items.find(x=>x.label===cat);const p=it?it.pct:0;
      if(p>0)stack.appendChild(el(`<div class="seg" style="flex:0 0 ${p}%;background:${colors[i%colors.length]}">${p>=9?p+'%':''}</div>`));});
    strow.appendChild(stack);c.appendChild(strow);});
  if(insightFn)c.appendChild(insight(insightFn()));
  c.appendChild(el(`<div class="note">${note?note+' · ':''}각 막대는 100% 기준이며, 좁은 구간은 % 표기를 생략했습니다.</div>`));
  parent.appendChild(c);
}
function rankingCard(parent,{title,meta,factors,recs,insightFn,note}){
  const c=card(title,meta);
  const arr=factors.map(f=>({...f,mean:meanRank(recs,f.code)})).filter(f=>f.mean!=null).sort((a,b)=>a.mean-b.mean);
  if(!arr.length){c.appendChild(el('<div class="nores">응답이 없습니다.</div>'));parent.appendChild(c);return;}
  const box=el('<div class="rank"></div>');
  arr.forEach((f,i)=>{const w=(7-f.mean)/6*100;
    box.appendChild(el(`<div class="ri"><div class="pos">${i+1}</div><div class="nm">${esc(f.name)}</div><div class="tr"><div class="tf" style="width:${w}%"></div></div><div class="mv">평균 ${f.mean.toFixed(2)}위</div></div>`));});
  c.appendChild(box);
  if(insightFn)c.appendChild(insight(insightFn(arr)));
  c.appendChild(el(`<div class="note">${note?note+' · ':''}7개 요소를 1~7위로 매긴 평균 순위. 막대가 길수록(1위에 가까울수록) 더 중요시한 요소입니다.</div>`));
  parent.appendChild(c);
}
function meanStat(parent,{title,meta,recs,key,low,high,insightExtra,note}){
  const c=card(title,meta);const m=meanOf(recs,key);
  if(!m.n){c.appendChild(el('<div class="nores">응답이 없습니다.</div>'));parent.appendChild(c);return;}
  c.appendChild(el(`<div class="meanbox"><span class="big">${m.mean.toFixed(2)}</span><span class="scale">/ 5점 · 응답 ${m.n}명</span></div>`));
  c.appendChild(el(`<div class="scalebar"><div class="pin" style="left:${(m.mean-1)/4*100}%"></div></div><div class="scaleends"><span>1 · ${low}</span><span>5 · ${high}</span></div>`));
  const dist=[1,2,3,4,5].map(v=>{const n=recs.filter(r=>r[key]===v).length;return{label:v+'점',n,pct:pct(n,m.n)};}).filter(x=>x.n>0);
  const box=el('<div class="bars" style="margin-top:14px"></div>');barsInto(box,dist,{colors:['var(--c1)']});c.appendChild(box);
  if(insightExtra)c.appendChild(insight(insightExtra(m,recs)));
  if(note)c.appendChild(el(`<div class="note">${note}</div>`));
  parent.appendChild(c);
}
/* generic button breakdown */
function groupBreakdown(parent,{title,meta,groups,contentFn,headerInsight,note}){
  const c=card(title,meta);
  if(headerInsight)c.appendChild(insight(headerInsight));
  if(!groups.length){c.appendChild(el('<div class="nores">응답이 없습니다.</div>'));parent.appendChild(c);return;}
  const tabs=el('<div class="ftabs"></div>'), body=el('<div class="breakbody"></div>');
  function show(i){[...tabs.children].forEach((b,j)=>b.classList.toggle('on',j===i));body.innerHTML='';contentFn(body,groups[i].recs,groups[i]);}
  groups.forEach((g,i)=>{const b=el(`<button>${esc(tr(g.label))} <span style="opacity:.6">(n=${g.recs.length})</span></button>`);b.onclick=()=>show(i);tabs.appendChild(b);});
  c.appendChild(tabs);c.appendChild(body);show(0);
  if(note)c.appendChild(el(`<div class="note">${note}</div>`));
  parent.appendChild(c);
}
function distInto(container,items,{colors,colorByLabel,empty}={}){
  if(!items.length){container.appendChild(el(`<div class="nores">${empty||'응답이 없습니다.'}</div>`));return;}
  const box=el('<div class="bars"></div>');barsInto(box,items,{colors,colorByLabel,percentOnly:true});container.appendChild(box);
}
/* compare bars: metrics x groups */
function compareBars(parent,{title,meta,metrics,groups,colors,insightFn,note}){
  const c=card(title,meta);
  metrics.forEach(m=>{
    c.appendChild(el(`<div class="subt">${esc(m.label)}</div>`));
    const vals=groups.map(g=>m.value(g.recs));
    const box=el('<div class="bars"></div>');
    groups.forEach((g,i)=>{const v=vals[i],col=colors?colors[i%colors.length]:PALETTE[i%PALETTE.length];
      box.appendChild(el(`<div class="bar"><span class="lab">${esc(tr(g.label))}<span class="kr">n=${g.recs.length}</span></span>${track(v.frac*100,col,v.text)}</div>`));});
    c.appendChild(box);
  });
  if(insightFn)c.appendChild(insight(insightFn()));
  if(note)c.appendChild(el(`<div class="note">${note}</div>`));
  parent.appendChild(c);
}
/* satisfaction reasons w/ hover voc */
function satisfactionCard(parent,recs){
  const c=card('가장 만족스러운 제형과 그 이유','제형은 단일선택 · 이유는 자유응답을 키워드로 분류(키워드에 마우스를 올리면 실제 응답을 볼 수 있습니다)');
  const r=countSingle(recs,'X',OPT['X']);
  let acc=0;const segs=[];
  r.items.forEach((it,idx)=>{const col=PALETTE[idx%PALETTE.length];segs.push(`${col} ${acc}% ${acc+it.pct}%`);acc+=it.pct;it._col=col;});
  if(acc<100&&segs.length)segs.push(`var(--neu) ${acc}% 100%`);
  const wrap=el('<div class="donutwrap"></div>');
  const top=r.items[0];
  wrap.appendChild(el(`<div class="donut" style="background:conic-gradient(${segs.join(',')})"><div class="ctr"><b>${top?top.pct+'%':'-'}</b><small>${top&&tr(top.label).length<=6?esc(tr(top.label)):''}</small></div></div>`));
  const lg=el('<div class="dlegend"></div>');
  r.items.forEach(it=>lg.appendChild(el(`<div class="it"><span class="sw" style="background:${it._col}"></span><span>${esc(tr(it.label))}</span><span class="pc">${it.pct}% <span class="nn">(${it.n})</span></span></div>`)));
  wrap.appendChild(lg);c.appendChild(wrap);
  if(top){const b=r.items[1];
    c.appendChild(insight(`만족도 1위 제형은 <b>${esc(tr(top.label))}</b>(${top.pct}%)입니다${b?`. 2위 ${esc(tr(b.label))}(${b.pct}%)와 ${top.pct-b.pct}%p 차이입니다`:''}. 아래에서 제형을 눌러 만족 이유를 확인하세요.`));}
  const tabs=el('<div class="ftabs"></div>'), body=el('<div class="breakbody"></div>');
  const formulas=r.items.map(i=>i.label);
  function render(f){[...tabs.children].forEach(b=>b.classList.toggle('on',b.dataset.f===f));body.innerHTML='';
    const givers=recs.filter(x=>x.X===f&&x.sat_voc);
    if(!givers.length){body.appendChild(el('<div class="nores">이 제형에 대한 유효한 이유 응답이 없습니다.</div>'));return;}
    const tagMap={};givers.forEach(x=>x.sat_tags.forEach(t=>{(tagMap[t]=tagMap[t]||[]).push(x.sat_voc);}));
    const kws=Object.entries(tagMap).sort((a,b)=>b[1].length-a[1].length);
    body.appendChild(el(`<div class="meta">유효 이유 응답 ${givers.length}명 기준 · 키워드에 마우스를 올리면 실제 응답 표시</div>`));
    if(kws.length){
      let rows='';kws.forEach(([k,vocs])=>{const vt=vocs.slice(0,8).map(v=>`<span class="vq">${esc(v)}</span>`).join('')+(vocs.length>8?`<span class="vq" style="opacity:.7">…외 ${vocs.length-8}건</span>`:'');
        rows+=`<tr class="kwrow"><td class="rh">${esc(k)} <span class="more">▸ 응답 보기</span><div class="voctip"><b>${esc(k)}</b> 관련 실제 응답${vt}</div></td><td>${vocs.length}</td><td><b>${pct(vocs.length,givers.length)}%</b></td></tr>`;});
      body.appendChild(el(`<table class="xt"><tr><th>키워드</th><th>언급 수</th><th>비중</th></tr>${rows}</table>`));
    } else body.appendChild(el('<div class="hint">키워드로 분류된 이유가 없습니다(대부분 단답·제품명).</div>'));
  }
  formulas.forEach(f=>{const b=el(`<button data-f="${esc(f)}">${esc(tr(f))}</button>`);b.onclick=()=>render(f);tabs.appendChild(b);});
  c.appendChild(tabs);c.appendChild(body);if(formulas.length)render(formulas[0]);
  c.appendChild(el('<div class="note">의미 없는 응답(yes/n/a 등)과 단순 브랜드·제품명은 제외했습니다. 키워드 분류는 자동 처리라 일부 응답은 미분류로 남습니다.</div>'));
  parent.appendChild(c);
}
function commentLine(parent,recs,key,label){const v=recs.map(r=>r[key]).filter(x=>x&&x.length>2);
  if(!v.length)return;parent.appendChild(el(`<div class="comment"><b>${esc(label)}</b> (기타 응답 ${v.length}건): ${v.slice(0,5).map(esc).join(' / ')}${v.length>5?' …':''}</div>`));}

/* sections */
const FAC=[{code:'BC',name:'사용감·마무리감'},{code:'BD',name:'가격·가성비'},{code:'BE',name:'자차 성분'},
  {code:'BF',name:'스킨케어 성분'},{code:'BG',name:'브랜드 신뢰도'},{code:'BH',name:'리뷰·추천'},{code:'BI',name:'SPF 지수'}];
function secHead(p,t,d){p.appendChild(el(`<h2 class="sec-h">${esc(t)}</h2>`));if(d)p.appendChild(el(`<p class="sec-d">${d}</p>`));}

    res:countSingle(recs,'skin',DATA.skin_order),colors:['var(--c1)'],
    insightFn:r=>smartInsight(r,{thing:'피부타입'}),note:'이 그래프도 상단 필터에 따라 함께 바뀝니다.'});
}

  barH(p,{title:'상황·목적에 따라 제품을 구분해 쓰는지',meta:'단일선택 · 응답 '+countSingle(recs,'N').base+'명',

      return gap>=15?`'매일' 사용 비율이 <b>${hi.nm}</b>(${hi.pct}%)에 가장 높고 <b>${lo.nm}</b>(${lo.pct}%)에 가장 낮아 계절 편차가 큽니다.`

    insightFn:()=>{const fs=[['로션·크림','S'],['세럼·에멀젼','T'],['젤','U'],['스틱·밤','V'],['스프레이·미스트','W']];
      const cur=fs.map(([nm,k])=>{const it=countSingle(recs,k,EXP).items.find(x=>x.label==='Currently using');return{nm,pct:it?it.pct:0};});
      const hi=cur.reduce((a,b)=>b.pct>a.pct?b:a), lo=cur.reduce((a,b)=>b.pct<a.pct?b:a);
      return `현재 사용률은 <b>${hi.nm}</b>(${hi.pct}%)가 가장 높고, <b>${lo.nm}</b>(${lo.pct}%)가 가장 낮습니다.`;}});

function renderS7(p,recs){

    const useClause=uh<ul?` 사용감은 반대로 고가대(${uh.toFixed(1)}위)가 저가대(${ul.toFixed(1)}위)보다 더 중시합니다.`:'';

    note:'가설: 저가 구매자일수록 가격·리뷰, 고가 구매자일수록 사용감·성분을 더 중시하는가.'});

  secHead(p,'전환 경험 및 이유','이전 제품에서 다른 제품으로 바꾼 이유.');
  barH(p,{title:'선케어 제품을 전환한 이유',meta:'복수응답 · 응답 '+countMulti(recs,'BK',OPT['BK']).base+'명',
    res:countMulti(recs,'BK',OPT['BK']),colors:['var(--c2)'],
    insightFn:r=>smartInsight(r,{multi:true})});
}
function renderS9(p,recs){
  secHead(p,'자차 성분','자외선 차단 성분(무기/유기)에 대한 인지와 선호.');
  donut(p,{title:'자차 성분 차이 인지 여부',meta:'단일선택 · 응답 '+countSingle(recs,'BM').base+'명',
    res:countSingle(recs,'BM',OPT['BM']),colors:['var(--c1)','var(--c3)','var(--c2)','var(--neu)'],
    insightFn:r=>{const know=r.items.filter(x=>/know the difference well|general idea/.test(x.label)).reduce((a,b)=>a+b.pct,0);const vague=100-know;
      return `성분 차이를 어느 정도 이상 아는 사람은 <b>${know}%</b>, 잘 모르거나 모호한 사람은 ${vague}%입니다.${know>=60?' 성분 메시지가 통할 기반이 넓습니다.':know<=40?' 아직 성분 인지도가 낮은 편입니다.':''}`;}});
  groupBreakdown(p,{title:'성분 인지 정도별 \'자차 성분\' 우선순위',
    meta:'인지 단계 버튼을 누르면 그 그룹의 자차 성분 순위 분포와 평균이 나옵니다',
    groups:OPT['BM'].map(a=>({label:a,recs:recs.filter(r=>r.BM===a)})).filter(g=>g.recs.length),
    contentFn:(b,gr)=>{const valid=gr.filter(r=>r.rank&&typeof r.rank.BE==='number');
      const dist=[1,2,3,4,5,6,7].map(v=>({label:v+'위',n:valid.filter(r=>r.rank.BE===v).length})).map(x=>({...x,pct:pct(x.n,valid.length)})).filter(x=>x.n>0);
      const m=meanRank(gr,'BE');b.appendChild(el(`<div class="meta">자차 성분 순위 분포 · 평균 ${m?m.toFixed(2)+'위':'-'}</div>`));
      distInto(b,dist,{colors:['var(--c1)']});},
    headerInsight:(()=>{const know=recs.filter(r=>/know the difference well/.test(r.BM)),no=recs.filter(r=>/no idea/.test(r.BM));
      const a=know.length?meanRank(know,'BE'):null,c=no.length?meanRank(no,'BE'):null;
      return (a&&c)?`성분 차이를 잘 아는 사람은 자차 성분을 평균 ${a.toFixed(2)}위로, 전혀 모르는 사람(${c.toFixed(2)}위)보다 ${a<c?'더 앞순위에 둡니다 — 아는 만큼 성분을 따집니다.':'크게 다르지 않습니다.'}`:'성분 인지도에 따라 구매 시 성분 우선순위가 달라지는지 비교해 보세요.';})()});
  barH(p,{title:'지금 쓰는 선케어의 자차 종류',meta:'단일선택 · 응답 '+countSingle(recs,'BN').base+'명',
    res:countSingle(recs,'BN',OPT['BN']),colors:['var(--c1)'],insightFn:r=>smartInsight(r)});
  // NEW crosstab: mineral users x white cast mention
  const MIN='Mineral (Zinc Oxide, Titanium Dioxide)';
  const minRecs=recs.filter(r=>r.BN===MIN);
  const wcCB=g=>g.filter(r=>Array.isArray(r.CB)&&r.CB.includes('White cast')).length;
  const wcCD=g=>g.filter(r=>Array.isArray(r.CD)&&r.CD.includes('White cast')).length;
  compareBars(p,{title:'무기자차 사용자는 \'백탁\'을 더 많이 호소할까',
    meta:'무기자차 사용자 vs 전체 응답자의 백탁 언급률 비교(백탁은 무기자차의 대표적 단점)',
    metrics:[
      {label:'사용 중 \'백탁\'을 불편으로 겪음',value:g=>({text:pct(wcCB(g),g.length)+'%',frac:pct(wcCB(g),g.length)/100})},
      {label:'현재 제품의 아쉬운 점으로 \'백탁\' 지목',value:g=>({text:pct(wcCD(g),g.length)+'%',frac:pct(wcCD(g),g.length)/100})},
    ],
    groups:[{label:'무기자차 사용자',recs:minRecs},{label:'전체 응답자',recs:recs}],colors:['var(--c4)','var(--neu)'],
    insightFn:()=>{const a=pct(wcCB(minRecs),minRecs.length),b=pct(wcCB(recs),recs.length);
      if(minRecs.length<10)return `무기자차 사용자 표본이 ${minRecs.length}명으로 매우 작아 참고용입니다.`;
      const d=a-b;
      return d>=8?`무기자차 사용자의 백탁 불편 경험률(${a}%)이 전체(${b}%)보다 ${d}%p 높아, 무기자차의 백탁 단점이 실제 사용 불편으로 드러납니다.`
        :`무기자차 사용자의 백탁 경험률(${a}%)은 전체(${b}%)와 큰 차이가 없습니다. 예상과 달리 백탁이 무기자차 사용자에게서 특별히 두드러지지는 않습니다.`;},
    note:smallBaseNote(minRecs.length)+'무기자차 사용자 '+minRecs.length+'명 기준.'});
  meanStat(p,{title:'선케어 구매 시 자차 성분을 고려하는 정도',meta:'1~5점 척도',recs,key:'BO',low:'전혀 고려 안 함',high:'매우 많이 고려',
    insightExtra:(m,rs)=>{const hi=rs.filter(r=>r.BO>=4).length;return `평균 ${m.mean.toFixed(2)}점, <b>적극 고려(4~5점)가 ${pct(hi,m.n)}%</b>입니다. 성분은 이미 구매 의사결정에 들어와 있는 변수입니다.`;}});
}
function renderS10(p,recs){
  secHead(p,'탐색 및 구매 경로','새 제품을 발견·검증하고 실제 구매하는 채널.');
  barH(p,{title:'새로운 선케어 제품 발견 경로',meta:'복수응답 · 응답 '+countMulti(recs,'BR',OPT['BR']).base+'명',
    res:countMulti(recs,'BR',OPT['BR']),colors:['var(--c1)'],insightFn:r=>smartInsight(r,{multi:true})});
  commentLine(p,recs,'BS','발견 경로 기타 의견');
  barH(p,{title:'새로운 제품 검증(신뢰 확인) 경로',meta:'복수응답 · 응답 '+countMulti(recs,'BT',OPT['BT']).base+'명',
    res:countMulti(recs,'BT',OPT['BT']),colors:['var(--c6)'],insightFn:r=>smartInsight(r,{multi:true})});
  commentLine(p,recs,'BU','검증 경로 기타 의견');
  barH(p,{title:'실제 선케어 구매 경로',meta:'복수응답 · 응답 '+countMulti(recs,'BV',OPT['BV']).base+'명',
    res:countMulti(recs,'BV',OPT['BV']),colors:['var(--c3)'],insightFn:r=>smartInsight(r,{multi:true})});
  commentLine(p,recs,'BW','구매 경로 기타 의견');
}
function renderS11(p,recs){
  secHead(p,'K뷰티 선케어','한국 선케어 제품 사용 경험과 브랜드.');
  const by=countSingle(recs,'BY',OPT['BY']);const yes=by.items.find(x=>x.label==='Yes')||{pct:0,n:0};
  donut(p,{title:'K뷰티 선케어 사용 경험 여부',meta:'단일선택 · 응답 '+by.base+'명',
    res:by,colorByLabel:{'Yes':'var(--c3)','No':'var(--neu)'},
    centerBig:yes.pct+'%',centerSmall:'사용 경험 있음',
    insightFn:()=>`K뷰티 선케어를 써본 사람은 <b>${yes.pct}%</b>(${yes.n}명)입니다. ${yes.pct<40?'아직 미경험자가 많아 진입 기회가 큽니다.':'이미 상당수가 경험해 본 카테고리입니다.'}`});
  const bzbase=countMulti(recs,'BZ',OPT['BZ']).base;
  barH(p,{title:'써본 K뷰티 브랜드',meta:'복수응답 · 사용 경험자 '+bzbase+'명 기준',
    res:countMulti(recs,'BZ',OPT['BZ']),colors:['var(--c5)'],
    insightFn:r=>{const anua=r.items.find(x=>x.label==='ANUA');return r.items[0]?`가장 많이 써본 브랜드는 <b>${esc(r.items[0].label)}</b>(${r.items[0].pct}%)입니다.${anua?` ANUA는 ${anua.pct}%(${anua.n}명)가 사용 경험이 있습니다.`:''}`:'사용 경험자가 없습니다.';},
    note:smallBaseNote(bzbase)+'브랜드명은 원문 그대로 표기했습니다.'});
}
function renderS12(p,recs){
  secHead(p,'사용 시 불편','선케어 사용 중 겪는 불편과 현재 제품의 아쉬운 점.');
  // 12-a: in-bar % labels; experience bar + biggest-pick sub-bar
  const c=card('겪어본 불편 + 가장 큰 불편',
    '복수응답(경험) + 단일선택(가장 큰 불편) · 응답 '+countMulti(recs,'CB',OPT['CB']).base+'명');
  c.appendChild(el('<div class="legend"><span class="lg"><span class="sw" style="background:var(--c8)"></span>그 불편을 겪은 비율(복수응답)</span><span class="lg"><span class="sw" style="background:var(--accent)"></span>가장 큰 불편으로 지목(단일선택)</span></div>'));
  const mm=countMulti(recs,'CB',OPT['CB']);
  const bigC={};let bigBase=0;recs.forEach(r=>{if(r.CC!=null){bigC[r.CC]=(bigC[r.CC]||0)+1;bigBase++;}});
  if(!mm.base)c.appendChild(el('<div class="nores">응답이 없습니다.</div>'));
  else{const box=el('<div class="bars"></div>');
    mm.items.forEach(it=>{const bp=pct(bigC[it.label]||0,bigBase);
      const row=el(`<div class="bar">${labelHTML(it.label)}<div></div></div>`);
      const cell=el('<div style="display:flex;flex-direction:column;gap:4px"></div>');
      cell.appendChild(el(track(it.pct,'var(--c8)',it.pct+'%',22)));
      cell.appendChild(el(track(bp,'var(--accent)',bp+'%',14)));
      row.lastChild.replaceWith(cell);box.appendChild(row);});
    c.appendChild(box);
    const topBig=Object.entries(bigC).sort((a,b)=>b[1]-a[1])[0];
    c.appendChild(insight(`가장 흔한 불편은 <b>${esc(tr(mm.items[0].label))}</b>(${mm.items[0].pct}%)이고, '가장 큰 불편'으로 가장 많이 꼽힌 건 <b>${esc(tr(topBig?topBig[0]:'-'))}</b>(${pct(topBig?topBig[1]:0,bigBase)}%)입니다. 흔한 불편과 가장 거슬리는 불편이 다를 수 있으니 우선순위 판단에 참고하세요.`));
  }
  c.appendChild(el('<div class="note">위 막대(회색)는 그 불편을 겪은 비율, 아래 막대(주황)는 그 불편을 가장 큰 불편으로 지목한 비율입니다.</div>'));
  p.appendChild(c);
  barH(p,{title:'현재 쓰는 선케어의 아쉬운 점',meta:'복수응답 · 응답 '+countMulti(recs,'CD',OPT['CD']).base+'명',
    res:countMulti(recs,'CD',OPT['CD']),colors:['var(--c4)'],insightFn:r=>smartInsight(r,{multi:true})});
  commentLine(p,recs,'CE','아쉬운 점 기타 의견');
}

const SECTIONS=[
  {id:'intro',num:'',title:'개요',render:renderIntro},
  {id:'s2',num:'2',title:'현재 선케어 사용 행태',render:renderS2},
  {id:'s3',num:'3',title:'자녀 전용 선크림',render:renderS3},
  {id:'s4',num:'4',title:'사용 맥락',render:renderS4},
  {id:'s5',num:'5',title:'선호하는 마무리감',render:renderS5},
  {id:'s6',num:'6',title:'틴티드 선스크린',render:renderS6},
  {id:'s7',num:'7',title:'구매 시 고려 요소 순위',render:renderS7},
  {id:'s8',num:'8',title:'전환 경험 및 이유',render:renderS8},
  {id:'s9',num:'9',title:'자차 성분',render:renderS9},
  {id:'s10',num:'10',title:'탐색 및 구매 경로',render:renderS10},
  {id:'s11',num:'11',title:'K뷰티 선케어',render:renderS11},
  {id:'s12',num:'12',title:'사용 시 불편',render:renderS12},
];
let current='intro';
const nav=document.getElementById('nav');
SECTIONS.forEach(s=>{const b=el(`<button data-id="${s.id}"><span class="num">${s.num||'·'}</span><span>${esc(s.title)}</span></button>`);
  b.onclick=()=>{current=s.id;renderAll();window.scrollTo(0,0);};nav.appendChild(b);});
document.getElementById('footN').textContent=NTOT;
const chips=document.getElementById('chips');
DATA.skin_order.forEach(sk=>{const chip=el(`<label class="chip on"><input type="checkbox" checked> ${SKIN_KR[sk]||sk} <span class="en">${esc(sk)}</span></label>`);
  const inp=chip.querySelector('input');inp.onchange=()=>{inp.checked?SEL.add(sk):SEL.delete(sk);chip.classList.toggle('on',inp.checked);renderAll();};
  chip.dataset.sk=sk;chips.appendChild(chip);});
function syncChips(){[...chips.children].forEach(ch=>{const on=SEL.has(ch.dataset.sk);ch.querySelector('input').checked=on;ch.classList.toggle('on',on);});}
document.getElementById('selAll').onclick=()=>{SEL=new Set(DATA.skin_order);syncChips();renderAll();};
document.getElementById('selNone').onclick=()=>{SEL=new Set();syncChips();renderAll();};
function renderAll(){const recs=filtered();
  document.getElementById('nbadge').textContent='n = '+recs.length;
  [...nav.children].forEach(b=>b.classList.toggle('on',b.dataset.id===current));
  const wrap=document.getElementById('wrap');wrap.innerHTML='';
  const panel=el('<div class="panel"></div>');wrap.appendChild(panel);
  const sec=SECTIONS.find(s=>s.id===current);
  if(!recs.length&&current!=='intro'){panel.appendChild(el('<div class="nores" style="margin-top:40px">선택된 피부타입이 없습니다. 위에서 하나 이상 선택해 주세요.</div>'));return;}
  sec.render(panel,recs);
}
renderAll();
</script>
